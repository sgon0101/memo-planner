<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Weave — 오프라인</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7F77DD">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; }
    body {
      background: linear-gradient(180deg, #f8fafc 0%, #ede9fe 100%);
      color: #1f2937;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(180deg, #0b0b12 0%, #1a1332 100%); color: #e5e7eb; }
      .card { background: #171826; border-color: rgba(139, 92, 246, 0.25); }
      .btn { background: #7c3aed; }
      .btn:hover { background: #6d28d9; }
      .hint { color: #a1a1aa; }
    }
    .card {
      max-width: 420px; width: 100%; padding: 40px 28px; text-align: center;
      background: #ffffff; border: 1px solid #ede9fe; border-radius: 20px;
      box-shadow: 0 20px 40px -20px rgba(124, 58, 237, 0.2);
    }
    .icon {
      width: 72px; height: 72px; margin: 0 auto 20px;
      display: grid; place-items: center;
      background: #ede9fe; border-radius: 20px;
    }
    .icon svg { width: 40px; height: 40px; color: #7c3aed; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
    p { font-size: 14px; line-height: 1.6; margin: 0 0 24px; color: #6b7280; }
    .hint { font-size: 12px; margin-top: 20px; color: #9ca3af; line-height: 1.6; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #7c3aed; color: #fff; font-weight: 600; font-size: 14px;
      padding: 12px 24px; border: 0; border-radius: 12px; cursor: pointer;
      transition: background 120ms ease;
    }
    .btn:hover { background: #6d28d9; }
    .btn:active { transform: scale(0.98); }
    .status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #6b7280; margin-top: 16px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; }
    .dot.online { background: #10b981; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>오프라인 상태예요</h1>
    <p>네트워크가 연결되면 자동으로 다시 시도할게요.<br>이미 열어본 페이지는 그대로 볼 수 있어요.</p>
    <button class="btn" id="retry">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
      다시 시도
    </button>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">오프라인</span>
    </div>
    <p class="hint">저장하지 못한 메모·플랜은 온라인 복귀 시 자동으로 동기화됩니다.</p>
  </main>
  <script>
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const btn = document.getElementById('retry');
    function updateStatus() {
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = '온라인 — 다시 접속 중';
        setTimeout(() => location.reload(), 400);
      } else {
        dot.classList.remove('online');
        text.textContent = '오프라인';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    btn.addEventListener('click', () => location.reload());
    updateStatus();
  </script>
</body>
</html>
